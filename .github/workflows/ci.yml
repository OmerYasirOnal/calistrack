name: ci

# Verifies the CalisTrack Flutter app: format, static analysis, and tests.
# The whole repo is the app, so this runs on every push and pull request.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test --reporter expanded
