name: ci

# Verifies the CalisTrack Flutter app: format, static analysis, and tests.
# The whole repo is the app, so this runs on every push and pull request.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Run tests (with coverage)
        run: flutter test --coverage --reporter expanded

      - name: Coverage gate (line coverage >= 75%)
        run: |
          pct=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{if(lf>0)printf "%.1f",lh/lf*100;else print "0"}' coverage/lcov.info)
          echo "Line coverage: ${pct}%"
          if awk -v p="$pct" 'BEGIN{exit (p+0>=75)?0:1}'; then
            echo "Coverage gate passed."
          else
            echo "::error::Line coverage ${pct}% is below the 75% gate"
            exit 1
          fi
