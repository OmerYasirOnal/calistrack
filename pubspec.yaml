name: calistrack
description: Calisthenics workout tracking — programs, set/rep/weight logging, progress charts, skill progression, and AI-generated programs.
publish_to: "none"
version: 0.1.0+1

environment:
  # Floor matches the modern APIs in use (Color.withValues, CardThemeData),
  # introduced in Flutter 3.27 / Dart 3.6. CI installs latest stable.
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  cloud_functions: ^5.0.1
  google_sign_in: ^6.2.1

  # Local cache (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Codegen toolchain (build_runner/riverpod_generator/hive_generator) is added
  # back in the milestone that introduces generated code, pinned to the then-
  # current analyzer to avoid resolution conflicts on latest-stable Flutter.

flutter:
  uses-material-design: true
  assets:
    - assets/data/
